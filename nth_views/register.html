<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Ký Tài Khoản - G4 ToyStore</title>
    <!-- Google Fonts đồng bộ với trang đăng nhập -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px; /* Thêm padding để không bị lỗi hiển thị trên màn hình nhỏ */
        }

        .register-container {
            background-color: #ffffff;
            padding: 35px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 480px; /* Rộng hơn trang login một chút vì nhiều trường thông tin hơn */
            text-align: center;
        }

        .logo-area {
            margin-bottom: 25px;
        }

        .logo-area h1 {
            color: #ff6b6b;
            font-size: 2rem;
            font-weight: 700;
        }

        .logo-area p {
            color: #777;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        /* Chia form thành 2 cột trên màn hình máy tính nếu cần, ở đây xếp chồng để gọn gàng */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* Khi màn hình nhỏ (điện thoại), tự động chuyển về 1 cột */
        @media (max-width: 480px) {
            .form-row {
                grid-template-columns: 1fr;
                gap: 0;
            }
        }

        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .form-group textarea {
            resize: none;
            height: 80px;
        }

        .form-group input:focus, .form-group textarea:focus {
            border-color: #4ecdc4;
            box-shadow: 0 0 8px rgba(78, 205, 196, 0.2);
        }

        .terms-area {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 25px;
            font-size: 0.85rem;
            text-align: left;
            cursor: pointer;
        }

        .terms-area a {
            color: #ff6b6b;
            text-decoration: none;
            font-weight: 600;
        }

        .terms-area a:hover {
            text-decoration: underline;
        }

        .btn-register {
            width: 100%;
            padding: 13px;
            background-color: #4ecdc4; /* Sử dụng màu xanh Mint làm màu chủ đạo cho nút Đăng Ký */
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.1s ease;
            text-transform: uppercase;
        }

        .btn-register:hover {
            background-color: #38b2ac;
        }

        .btn-register:active {
            transform: scale(0.98);
        }

        .login-link {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #666;
        }

        .login-link a {
            color: #ff6b6b;
            text-decoration: none;
            font-weight: 700;
        }

        .login-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="register-container">
        <div class="logo-area">
            <h1>🧸 G4 ToyStore</h1>
            <p>Đăng ký thành viên để nhận nhiều ưu đãi</p>
        </div>

        <!-- Form Đăng Ký -->
        <form action="#" method="POST">
            
            <!-- Họ tên -->
            <div class="form-group">
                <label for="fullname">Họ và tên</label>
                <input type="text" id="fullname" name="HKKM_Full_Name" placeholder="Ví dụ: Nguyễn Văn An" required>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label for="email">Email tài khoản</label>
                <input type="email" id="email" name="HKKM_Email" placeholder="example@toystore.com" required>
            </div>

            <!-- Hàng gồm: Số điện thoại và Mật khẩu -->
            <div class="form-row">
                <div class="form-group">
                    <label for="phone">Số điện thoại</label>
                    <input type="tel" id="phone" name="HKKM_Phone" placeholder="09xxxxxxxx" required>
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" name="HKKM_Password_Hash" placeholder="Tối thiểu 6 ký tự" required>
                </div>
            </div>

            <!-- Địa chỉ nhận hàng -->
            <div class="form-group">
                <label for="address">Địa chỉ giao hàng</label>
                <textarea id="address" name="HKKM_Address" placeholder="Số nhà, tên đường, phường/xã, quận/huyện..."></textarea>
            </div>

            <!-- Điều khoản dịch vụ -->
            <label class="terms-area">
                <input type="checkbox" name="terms" required> 
                <span>Tôi đồng ý với <a href="#">Điều khoản sử dụng</a> và <a href="#">Chính sách bảo mật</a>.</span>
            </label>

            <!-- Nút đăng ký -->
            <button type="submit" class="btn-register">Đăng Ký Ngay</button>
        </form>

        <!-- Link quay lại trang đăng nhập -->
        <div class="login-link">
            Đã có tài khoản? <a href="login.html">Đăng nhập tại đây</a>
        </div>
    </div>

</body>
</html>
