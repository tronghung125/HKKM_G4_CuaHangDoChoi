<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập - G4 ToyStore</title>
    <!-- Google Fonts để chữ nhìn mượt và đẹp hơn -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-container {
            background-color: #ffffff;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo-area {
            margin-bottom: 25px;
        }

        .logo-area h1 {
            color: #ff6b6b; /* Màu sắc tươi vui phù hợp ToyStore */
            font-size: 2rem;
            font-weight: 700;
        }

        .logo-area p {
            color: #777;
            font-size: 0.9rem;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 0.9rem;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            outline: none;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        /* Hiệu ứng khi click vào ô nhập liệu */
        .form-group input:focus {
            border-color: #4ecdc4;
            box-shadow: 0 0 8px rgba(78, 205, 196, 0.2);
        }

        .options-area {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
            font-size: 0.85rem;
        }

        .options-area a {
            color: #ff6b6b;
            text-decoration: none;
            font-weight: 600;
        }

        .options-area a:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background-color: #ff6b6b;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.3s ease, transform 0.1s ease;
        }

        .btn-login:hover {
            background-color: #ee5253;
        }

        .btn-login:active {
            transform: scale(0.98);
        }

        .register-link {
            margin-top: 25px;
            font-size: 0.9rem;
            color: #666;
        }

        .register-link a {
            color: #4ecdc4;
            text-decoration: none;
            font-weight: 700;
        }

        .register-link a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="logo-area">
            <h1>🧸 G4 ToyStore</h1>
            <p>Chào mừng bạn đến với thế giới đồ chơi!</p>
        </div>

        <!-- Form Đăng Nhập -->
        <!-- Lưu ý: Thuộc tính name được đặt trùng với cột trong DB để sau này bạn dễ kết nối Backend (PHP, NodeJS, ASP.NET...) -->
        <form action="#" method="POST">
            
            <!-- Ô nhập Email -->
            <div class="form-group">
                <label for="email">Email đăng nhập</label>
                <input type="email" id="email" name="HKKM_Email" placeholder="Nhập email của bạn..." required>
            </div>

            <!-- Ô nhập Mật khẩu -->
            <div class="form-group">
                <label for="password">Mật khẩu</label>
                <input type="password" id="password" name="HKKM_Password_Hash" placeholder="Nhập mật khẩu..." required>
            </div>

            <!-- Ghi nhớ & Quên mật khẩu -->
            <div class="options-area">
                <label style="display: flex; align-items: center; gap: 5px; cursor: pointer;">
                    <input type="checkbox" name="remember"> Ghi nhớ tôi
                </label>
                <a href="#">Quên mật khẩu?</a>
            </div>

            <!-- Nút đăng nhập -->
            <button type="submit" class="btn-login">ĐĂNG NHẬP</button>
        </form>

        <div class="register-link">
            Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a>
        </div>
    </div>

</body>
</html>
